networks:
  llms-network:
    driver: bridge

services:

  backend:
    container_name: llms-backend
    build:
      context: ..
      dockerfile: container/Dockerfile.backend
    ports:
      - 9000:9000
    expose:
      - 9000
    env_file:
      - ../.env
    environment:
      - PORT=9000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DEFAULT_LLM_PROVIDER=${DEFAULT_LLM_PROVIDER:-OPENAI}
      - DEFAULT_LLM_MODEL=${DEFAULT_LLM_MODEL:-gpt-4o-mini}
    volumes:
      - ../data:/app/data:ro  # Mount data directory as read-only
    networks:
      - llms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    container_name: llms-frontend
    build:
      context: ..
      dockerfile: container/Dockerfile.frontend
    ports:
      - 9001:9001
    expose:
      - 9001
    env_file:
      - ../.env
    environment:
      # - API_BASE_URL=http://backend:9000
      - API_BASE_URL=http://host.docker.internal:9000
      - API_TIMEOUT=300
      - PORT=9001
    # depends_on:
    #   backend:
    #     condition: service_healthy
    networks:
      - llms-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:9001/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  qdrant:
    image: qdrant/qdrant:latest
    restart: always
    container_name: qdrant
    ports:
      - 6333:6333
      - 6334:6334
      - 6335:6335
    expose:
      - 6333
      - 6334
      - 6335
    configs:
      - source: qdrant_config
        target: /qdrant/config/production.yaml
    volumes:
      - ../data/qdrant_data:/qdrant/storage

configs:
  qdrant_config:
    content: |
      log_level: INFO